<!DOCTYPE html>
<html lang="ta" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>NIE Tamil Math Tutor — Voice</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0e17;
  --surface: #121929;
  --surface-2: #1a2234;
  --primary: #4f8cff;
  --primary-glow: rgba(79,140,255,0.15);
  --accent: #00e5a0;
  --accent-dim: rgba(0,229,160,0.12);
  --danger: #ff5c5c;
  --text: #e4e8f1;
  --text-dim: #7a849b;
  --border: #252e42;
  --radius: 14px;
  --font-ta: 'Noto Sans Tamil', sans-serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; }
body {
  font-family: var(--font-ta);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}

header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
header .logo {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--primary), var(--accent));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: var(--bg);
}
header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
header .badge {
  font-size: 0.7rem;
  padding: 3px 8px;
  border-radius: 20px;
  background: var(--accent-dim);
  color: var(--accent);
  font-weight: 600;
}

.settings-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  font-size: 0.8rem;
}
.settings-bar label { color: var(--text-dim); }
.settings-bar select, .settings-bar input {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 8px;
  border-radius: 6px;
  font-family: var(--font-ta);
  font-size: 0.8rem;
}

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
}

.msg {
  max-width: 88%;
  padding: 12px 16px;
  border-radius: var(--radius);
  line-height: 1.7;
  font-size: 0.95rem;
  animation: fadeSlide 0.25s ease-out;
}
@keyframes fadeSlide {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}
.msg.student {
  align-self: flex-end;
  background: var(--primary);
  color: #fff;
  border-bottom-right-radius: 4px;
}
.msg.tutor {
  align-self: flex-start;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.msg.tutor .meta {
  font-size: 0.7rem;
  color: var(--text-dim);
  margin-top: 8px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.msg.tutor .meta span {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.msg.system {
  align-self: center;
  background: var(--accent-dim);
  color: var(--accent);
  font-size: 0.8rem;
  padding: 6px 14px;
}
.msg.error {
  align-self: center;
  background: rgba(255,92,92,0.1);
  color: var(--danger);
  font-size: 0.8rem;
  padding: 6px 14px;
}

.diagram-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-top: 8px;
}
.diagram-card h4 {
  font-size: 0.8rem;
  color: var(--accent);
  margin-bottom: 8px;
}
.diagram-card pre {
  font-size: 0.75rem;
  overflow-x: auto;
  color: var(--text-dim);
  background: var(--bg);
  padding: 8px;
  border-radius: 8px;
}

.exercise-card {
  background: var(--surface);
  border: 1px solid var(--primary);
  border-radius: var(--radius);
  padding: 12px 16px;
  margin-top: 8px;
}
.exercise-card h4 {
  font-size: 0.8rem;
  color: var(--primary);
  margin-bottom: 8px;
}

/* ─── Blackboard diagram ─── */
.blackboard {
  background:
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.018) 39px, rgba(255,255,255,0.018) 40px),
    linear-gradient(170deg, #1a3a1a 0%, #2d4a2d 30%, #1e3e1e 100%);
  border: 8px solid #5c3a1e;
  border-radius: 4px;
  box-shadow: inset 0 0 50px rgba(0,0,0,0.3), 0 4px 20px rgba(0,0,0,0.4);
  padding: 18px 16px;
  margin: 10px 0;
  font-family: var(--font-ta);
}
.board-title {
  color: #fffaaa;
  font-size: 1rem;
  font-weight: 700;
  text-align: center;
  margin-bottom: 10px;
  text-shadow: 0 0 8px rgba(255,250,170,0.2);
}
.board-canvas { text-align: center; overflow-x: auto; }
.board-canvas svg { display: inline-block; }
.board-result {
  color: #90ee90;
  font-size: 0.95rem;
  font-weight: 600;
  text-align: center;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px dashed rgba(255,255,255,0.15);
}
.board-controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}
.board-controls button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  color: #f0f0e8;
  padding: 5px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-family: var(--font-ta);
  font-size: 0.8rem;
}
.board-controls button:hover { background: rgba(255,255,255,0.15); }
.board-controls button:disabled { opacity: 0.3; cursor: default; }
.board-controls .step-label {
  color: #fffaaa;
  font-size: 0.8rem;
  min-width: 80px;
  text-align: center;
}
.chalk-table {
  border-collapse: collapse;
  margin: 0 auto;
}
.chalk-table td {
  padding: 5px 14px;
  font-size: 1.05rem;
  color: #f0f0e8;
  text-align: center;
  font-family: var(--font-ta);
}
.chalk-table .divisor {
  color: #fffaaa;
  font-weight: bold;
  border-right: 2px solid rgba(255,255,255,0.35);
  padding-right: 10px;
}
.chalk-table tr { border-bottom: 1px solid rgba(255,255,255,0.12); }
.chalk-table .final { color: #90ee90; font-weight: bold; }
.chalk-table .carried { color: rgba(255,255,255,0.4); }

.input-bar {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  gap: 8px;
  align-items: center;
  position: sticky;
  bottom: 0;
}
.input-bar input[type="text"] {
  flex: 1;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: 10px;
  font-family: var(--font-ta);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}
.input-bar input[type="text"]:focus {
  border-color: var(--primary);
}

.btn {
  width: 44px; height: 44px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.15s, background 0.2s;
  flex-shrink: 0;
}
.btn:active { transform: scale(0.92); }
.btn-send {
  background: var(--primary);
  color: #fff;
}
.btn-mic {
  background: var(--surface-2);
  border: 2px solid var(--border);
  color: var(--text);
  position: relative;
}
.btn-mic.recording {
  background: var(--danger);
  border-color: var(--danger);
  color: #fff;
  animation: pulse 1.2s infinite;
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,92,92,0.4); }
  50% { box-shadow: 0 0 0 10px rgba(255,92,92,0); }
}
.btn-speak {
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid rgba(0,229,160,0.2);
}
.btn-speak.speaking {
  background: var(--accent);
  color: var(--bg);
}

.status-strip {
  text-align: center;
  font-size: 0.72rem;
  color: var(--text-dim);
  padding: 4px;
  background: var(--bg);
}
.status-strip .dot {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  margin-right: 4px;
  vertical-align: middle;
}
.status-strip .dot.green { background: var(--accent); }
.status-strip .dot.red { background: var(--danger); }
.status-strip .dot.yellow { background: #f0c040; }

svg.icon { width: 20px; height: 20px; fill: currentColor; }

.typing-indicator {
  display: inline-flex; gap: 4px; padding: 4px 0;
}
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--text-dim);
  border-radius: 50%;
  animation: bounce 1.4s infinite ease-in-out;
}
.typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
.typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1.0); }
}

@media (max-width: 480px) {
  header h1 { font-size: 0.85rem; }
  .msg { max-width: 94%; font-size: 0.9rem; }
  .settings-bar { padding: 6px 12px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">π</div>
  <h1>NIE கணிதம் — குரல் ஆசிரியர்</h1>
  <span class="badge" id="backendBadge" title="Teaching LLM vs voice STT">LLM: …</span>
  <span class="badge" id="dialectBadge">dialect: —</span>
</header>

<div class="settings-bar">
  <label>மாவட்டம்:</label>
  <select id="district">
    <option value="unknown">தானியங்கி</option>
    <option value="jaffna">யாழ்ப்பாணம்</option>
    <option value="batticaloa">மட்டக்களப்பு</option>
    <option value="nuwara_eliya">நுவரெலியா</option>
    <option value="colombo">கொழும்பு</option>
  </select>
  <label>API:</label>
  <input type="text" id="apiUrl" value="http://localhost:8001" style="width:160px">
  <label>குரல் வேகம்:</label>
  <input type="range" id="speechRate" min="0.5" max="1.5" step="0.1" value="0.9" style="width:80px">
</div>

<div class="chat-area" id="chatArea">
  <div class="msg system">வணக்கம்! கணிதக் கேள்வியைக் கேளுங்கள் — குரல் அல்லது உரை மூலம்.</div>
</div>

<div class="status-strip" id="statusStrip">
  <span class="dot green"></span> தயார்
</div>

<div class="input-bar">
  <button class="btn btn-mic" id="micBtn" title="பேசுங்கள்">
    <svg class="icon" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
  </button>
  <input type="text" id="textInput" placeholder="கேள்வியை இங்கே தட்டச்சு செய்யுங்கள்..." autocomplete="off">
  <button class="btn btn-send" id="sendBtn" title="அனுப்பு">
    <svg class="icon" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
  <button class="btn btn-speak" id="speakBtn" title="பதிலைக் கேளுங்கள்">
    <svg class="icon" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
  </button>
</div>

<script>
const $ = s => document.querySelector(s);
const chatArea = $('#chatArea');
const micBtn = $('#micBtn');
const sendBtn = $('#sendBtn');
const speakBtn = $('#speakBtn');
const textInput = $('#textInput');
const statusStrip = $('#statusStrip');
const dialectBadge = $('#dialectBadge');
const backendBadge = $('#backendBadge');

async function refreshBackendBadge() {
  const baseUrl = ($('#apiUrl') && $('#apiUrl').value || '').replace(/\/$/, '');
  if (!baseUrl || !backendBadge) return;
  try {
    const res = await fetch(`${baseUrl}/health`);
    if (!res.ok) throw new Error('health');
    const h = await res.json();
    const llm = h.llm_backend || 'gemini';
    const tm = h.teaching_model || '';
    const stt = h.voice_transcribe_stt_backend || 'gemini';
    backendBadge.textContent =
      `கற்பித்தல்: ${llm}${tm ? ` (${tm})` : ''} · குரல்→உரை: ${stt}`;
    backendBadge.title =
      'Teaching uses LLM_BACKEND. Mic transcription still uses Gemini API (quota). Type your question to skip STT.';
  } catch {
    backendBadge.textContent = 'LLM: ?';
  }
}

// ═══════════════════════════════════════════════════════════════
// Blackboard Diagram Renderer  (Ch.4: Factors, HCF, LCM)
// ═══════════════════════════════════════════════════════════════
const CK = {w:'#f0f0e8', y:'#fffaaa', g:'#90ee90', b:'#87ceeb', p:'#ffb6c1', d:'rgba(255,255,255,0.35)'};

function renderDiagram(spec, container) {
  if (!spec || !spec.diagram) return;
  const board = document.createElement('div');
  board.className = 'blackboard';

  if (spec.label_ta) {
    const t = document.createElement('div');
    t.className = 'board-title';
    t.textContent = spec.label_ta;
    board.appendChild(t);
  }

  const canvas = document.createElement('div');
  canvas.className = 'board-canvas';
  board.appendChild(canvas);

  let steps = 0;
  switch (spec.diagram) {
    case 'factor_tree':         steps = drawFactorTree(spec, canvas); break;
    case 'division_ladder':
    case 'lcm_division_ladder': steps = drawLadder(spec, canvas); break;
    case 'factor_pairs':        steps = drawPairs(spec, canvas); break;
    case 'multiples_line':      steps = drawMultiplesLine(spec, canvas); break;
    default:
      canvas.innerHTML = `<pre style="color:${CK.d};font-size:.75rem">${JSON.stringify(spec,null,2)}</pre>`;
  }

  const rText = spec.result_label_ta || '';
  if (rText) {
    const r = document.createElement('div');
    r.className = 'board-result';
    r.textContent = rText;
    r.setAttribute('data-step', String(steps));
    board.appendChild(r);
  }

  if (steps > 1) boardStepControls(board, steps);
  else board.querySelectorAll('[data-step]').forEach(e => e.style.opacity = '1');

  container.appendChild(board);
}

// ── Factor Tree (SVG) ──
function drawFactorTree(spec, el) {
  const tree = spec.tree;
  if (!tree) return 0;
  const nodes = [], edges = [];
  let leafIdx = 0;
  (function walk(nd, depth, pid) {
    if (!nd) return;
    const id = nodes.length;
    const isLeaf = !nd.left && !nd.right;
    nodes.push({ id, v: nd.value, prime: !!nd.is_prime, depth, isLeaf, li: isLeaf ? leafIdx++ : -1, x:0, y:0 });
    if (pid >= 0) edges.push({ f: pid, t: id });
    walk(nd.left,  depth+1, id);
    walk(nd.right, depth+1, id);
  })(tree, 0, -1);

  const R = 24, slotW = 72, lvlH = 74, pad = 40;
  const maxD = Math.max(...nodes.map(n=>n.depth));

  nodes.forEach(n => { if (n.isLeaf) n.x = pad + n.li*slotW + slotW/2; n.y = pad + n.depth*lvlH; });
  for (let d = maxD-1; d >= 0; d--) {
    nodes.filter(n => n.depth===d && !n.isLeaf).forEach(n => {
      const kids = edges.filter(e=>e.f===n.id).map(e=>nodes[e.t]);
      if (kids.length) n.x = kids.reduce((s,c)=>s+c.x,0)/kids.length;
    });
  }

  const W = Math.max(...nodes.map(n=>n.x)) + pad + R + 10;
  const H = maxD * lvlH + pad*2 + R + 10;
  let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-height:420px">`;

  edges.forEach(e => {
    const a=nodes[e.f], b=nodes[e.t];
    s += `<line x1="${a.x}" y1="${a.y+R}" x2="${b.x}" y2="${b.y-R}" stroke="${CK.d}" stroke-width="2" data-step="${b.depth+1}"/>`;
  });

  nodes.forEach(n => {
    const st = n.depth+1;
    const fill = n.prime ? 'rgba(144,238,144,0.15)' : 'rgba(135,206,235,0.1)';
    const stroke = n.prime ? CK.g : CK.b;
    if (n.prime)
      s += `<circle cx="${n.x}" cy="${n.y}" r="${R}" fill="${fill}" stroke="${stroke}" stroke-width="2" data-step="${st}"/>`;
    else
      s += `<rect x="${n.x-R}" y="${n.y-R}" width="${R*2}" height="${R*2}" rx="5" fill="${fill}" stroke="${stroke}" stroke-width="2" data-step="${st}"/>`;
    s += `<text x="${n.x}" y="${n.y+6}" text-anchor="middle" fill="${CK.w}" font-size="16" font-weight="bold" data-step="${st}">${n.v}</text>`;
  });

  s += '</svg>';
  el.innerHTML = s;
  return maxD + 2;
}

// ── Division Ladder — HCF / LCM / single-number (HTML table) ──
function drawLadder(spec, el) {
  const steps = spec.steps || [];
  const isLcm = spec.diagram === 'lcm_division_ladder';
  if (!steps.length) { el.innerHTML = `<p style="color:${CK.d};text-align:center">படிகள் இல்லை</p>`; return 0; }

  let html = '<table class="chalk-table">';
  steps.forEach((st, i) => {
    html += `<tr data-step="${i+1}"><td class="divisor">${st.divisor}</td>`;
    st.before.forEach((v, j) => {
      const changed = isLcm ? (v !== st.after[j]) : true;
      html += `<td class="${changed ? '' : 'carried'}">${v}</td>`;
    });
    html += '</tr>';
  });

  const last = steps[steps.length-1].after;
  html += `<tr data-step="${steps.length+1}"><td></td>`;
  last.forEach(v => { html += `<td class="final">${v}</td>`; });
  html += '</tr></table>';

  el.innerHTML = html;
  return steps.length + 2;
}

// ── Factor Pairs (HTML table) ──
function drawPairs(spec, el) {
  const pairs = spec.pairs || [];
  const n = spec.number;
  let html = '<table class="chalk-table">';
  pairs.forEach((pr, i) => {
    html += `<tr data-step="${i+1}">`;
    html += `<td style="color:${CK.g};font-weight:bold">${pr[0]}</td>`;
    html += `<td style="color:${CK.d}">×</td>`;
    html += `<td style="color:${CK.b};font-weight:bold">${pr[1]}</td>`;
    html += `<td style="color:${CK.d};font-size:.85rem">= ${n}</td>`;
    html += '</tr>';
  });
  html += '</table>';
  el.innerHTML = html;
  return pairs.length + 1;
}

// ── Multiples Line (SVG) ──
function drawMultiplesLine(spec, el) {
  const nums = spec.numbers || [];
  const upTo = spec.show_up_to || 48;
  const common = spec.highlight_common || [];
  const cMap = spec.color_map || {};
  const palette = { blue:CK.b, purple:'#d8b4fe', teal:'#5eead4', amber:'#fcd34d' };

  const padX=40, padY=30, lineGap=52;
  const pxPerUnit = Math.max(8, Math.min(14, 600/upTo));
  const lineLen = upTo * pxPerUnit;
  const W = padX*2 + lineLen;
  const H = padY*2 + nums.length*lineGap + 30;

  let s = `<svg viewBox="0 0 ${W} ${H}" width="100%" style="max-height:260px">`;
  nums.forEach((n, i) => {
    const y = padY + i*lineGap + 28;
    const c = palette[cMap[String(n)]] || CK.w;
    const st = i+1;
    s += `<text x="${padX-8}" y="${y+5}" text-anchor="end" fill="${c}" font-size="14" font-weight="bold" data-step="${st}">${n}</text>`;
    s += `<line x1="${padX}" y1="${y}" x2="${padX+lineLen}" y2="${y}" stroke="${CK.d}" stroke-width="1" data-step="${st}"/>`;
    for (let m=n; m<=upTo; m+=n) {
      const x = padX + m*pxPerUnit;
      const isCom = common.includes(m);
      s += `<circle cx="${x}" cy="${y}" r="${isCom?7:4}" fill="${isCom?CK.y:c}" opacity="${isCom?1:0.7}" data-step="${st}"/>`;
      s += `<text x="${x}" y="${y-10}" text-anchor="middle" fill="${isCom?CK.y:c}" font-size="${isCom?11:9}" data-step="${st}">${m}</text>`;
    }
  });
  s += '</svg>';
  el.innerHTML = s;
  return nums.length + 1;
}

// ── Step-by-step controls ──
function boardStepControls(board, maxStep) {
  let cur = 0;
  const ctl = document.createElement('div'); ctl.className = 'board-controls';
  const prev = document.createElement('button'); prev.textContent = '◀';
  const lbl  = document.createElement('span');  lbl.className = 'step-label';
  const next = document.createElement('button'); next.textContent = '▶';
  const all  = document.createElement('button'); all.textContent = 'அனைத்தும்';
  ctl.append(prev, lbl, next, all);
  board.appendChild(ctl);

  function upd() {
    lbl.textContent = cur === 0 ? 'தொடங்கு ▶' : `படி ${cur} / ${maxStep}`;
    prev.disabled = cur <= 0;
    next.disabled = cur >= maxStep;
    board.querySelectorAll('[data-step]').forEach(e => {
      const s = parseInt(e.dataset.step);
      e.style.opacity = s <= cur ? '1' : '0';
      e.style.transition = 'opacity 0.45s ease';
    });
  }
  prev.onclick = () => { if (cur>0) { cur--; upd(); } };
  next.onclick = () => { if (cur<maxStep) { cur++; upd(); } };
  all.onclick  = () => { cur = maxStep; upd(); };
  upd();
  setTimeout(() => { cur = 1; upd(); }, 400);
}

let lastTutorText = '';
let isSpeaking = false;
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];

function addMsg(type, html, meta) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  div.innerHTML = html;
  if (meta) {
    const metaDiv = document.createElement('div');
    metaDiv.className = 'meta';

  }

  chatArea.scrollTop = chatArea.scrollHeight;

}

function addTyping() {
  const div = addMsg('tutor', '<div class="typing-indicator"><span></span><span></span><span></span></div>');
  div.id = 'typingMsg';
  return div;
}

function removeTyping() {
  const el = document.getElementById('typingMsg');
  if (el) el.remove();
}

function setStatus(color, text) {
  statusStrip.innerHTML = `<span class="dot ${color}"></span> ${text}`;

function formatExplanation(text) {
  if (!text) return '';
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

async function sendQuery(question) {
  if (!question.trim()) return;

  addMsg('student', question);
  textInput.value = '';

  const typingEl = addTyping();
  setStatus('yellow', 'ஆசிரியர் சிந்திக்கிறார்...');

  const baseUrl = $('#apiUrl').value.replace(/\/$/, '');
  const district = $('#district').value;

  try {
    const res = await fetch(`${baseUrl}/api/v1/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        student_id: 'SL_TM_VOICE_001',
        question: question,
        district: district,
        student_name: 'குரல் மாணவர்',
        top_k: 6,
      }),
    });

    removeTyping();

    if (!res.ok) {
      const errText = await res.text();
      addMsg('error', `API பிழை: ${res.status} — ${errText}`);
      setStatus('red', 'பிழை');
      return;
    }

    const data = await res.json();

    if (data.dialect_detected && data.dialect_detected !== 'unknown') {
      dialectBadge.textContent = `dialect: ${data.dialect_detected}`;
    }

    const rawErr = data.error || '';
    const looksLikeQuota =
      data.quota_exhausted ||
      /429|RESOURCE_EXHAUSTED|generate_content_free_tier|Quota exceeded/i.test(rawErr);

    if (looksLikeQuota && rawErr) {
      const wait =
        data.retry_after_seconds != null
          ? ` (மீண்டும் முயற்சி: ~${Math.ceil(data.retry_after_seconds)} வி)`
          : '';
      addMsg('error', rawErr + wait);
      setStatus('yellow', 'API அளவு எல்லை');
      return;
    }

    if (data.error && !data.teaching?.explanation_ta?.trim()) {
      addMsg('error', rawErr);
      setStatus('red', 'பிழை');
      return;
    }

    const explanation = data.teaching?.explanation_ta || 'பதில் கிடைக்கவில்லை.';
    lastTutorText = explanation;

    let metaHtml = '';
    if (data.intent) metaHtml += `<span>நோக்கம்: ${data.intent}</span>`;
    if (data.processing_time_ms) metaHtml += `<span>⏱ ${Math.round(data.processing_time_ms)}ms</span>`;
    if (data.dialect_detected && data.dialect_detected !== 'unknown') {
      metaHtml += `<span>வட்டாரம்: ${data.dialect_detected}</span>`;
    }

    addMsg('tutor', formatExplanation(explanation), metaHtml);

    if (data.diagram && data.diagram.spec && data.diagram.spec.diagram) {
      const diagDiv = document.createElement('div');
      renderDiagram(data.diagram.spec, diagDiv);
      chatArea.appendChild(diagDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    if (data.exercise && data.exercise.question_ta) {
      const exDiv = document.createElement('div');
      exDiv.className = 'exercise-card';
      exDiv.innerHTML = `
        <h4>✏️ பயிற்சி</h4>
        <p>${data.exercise.question_ta}</p>
        ${data.exercise.hint_ta ? '<p style="color:var(--text-dim);font-size:0.8rem">💡 ' + data.exercise.hint_ta + '</p>' : ''}
      `;
      chatArea.appendChild(exDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    setStatus('green', 'தயார்');

  } catch (err) {
    removeTyping();
    addMsg('error', `இணைப்பு பிழை: ${err.message}`);
    setStatus('red', 'சேவையகத்தை அணுக முடியவில்லை');
  }
}

sendBtn.addEventListener('click', () => sendQuery(textInput.value));
textInput.addEventListener('keydown', e => {

/* ── Mic button: MediaRecorder → Gemini transcription ── */

let recordingDiv = null;
let recordingTimer = null;
let recordingSecs = 0;

function updateRecordingTime() {
  recordingSecs++;
  if (recordingDiv) {
    recordingDiv.innerHTML = `🎤 பதிவு செய்கிறது... <strong>${recordingSecs}வி</strong>`;
  }
}

function uint8ToBase64(bytes) {
  let binary = '';
  const chunkSize = 8192;
  for (let i = 0; i < bytes.length; i += chunkSize) {
    const slice = bytes.subarray(i, i + chunkSize);
    binary += String.fromCharCode.apply(null, slice);
  }
  return btoa(binary);
}

async function transcribeAudio(blob) {
  const baseUrl = $('#apiUrl').value.replace(/\/$/, '');
  const arrayBuf = await blob.arrayBuffer();
  const b64 = uint8ToBase64(new Uint8Array(arrayBuf));

  setStatus('yellow', '🔄 குரலை உரையாக மாற்றுகிறது...');

  const res = await fetch(`${baseUrl}/api/v1/voice/transcribe`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      audio_base64: b64,
      mime_type: blob.type || 'audio/webm',
    }),
  });

  if (!res.ok) {
    let detail = `${res.status}`;
    let retryAfter = null;
    try {
      const errJson = await res.json();
      const d = errJson.detail;
      if (d && typeof d === 'object') {
        detail = d.message || d.hint_ta || JSON.stringify(d);
        retryAfter = d.retry_after_seconds;
      } else {
        detail = d || JSON.stringify(errJson);
      }
    } catch { detail = await res.text().catch(() => detail); }
    const err = new Error(res.status === 429 ? `429 quota: ${detail}` : detail);
    err.retryAfter = retryAfter;
    err.isQuota = res.status === 429;
    throw err;
  }

  const data = await res.json();
  return data.transcript || '';
}

const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;

/** Web Speech API uses `network` when Google's recognition backend fails — not always HTTP "network". */
function speechErrorToTamil(code) {
  const c = (code || '').toLowerCase();
  const map = {
    network:
      'Chrome-இன் Google குரல் சேவை இணைக்க முடியவில்லை (பிழை: network). VPN முடக்கவும், இணையத்தைச் சோதிக்கவும், அல்லது கேள்வியை உரையாக தட்டச்சு செய்யுங்கள் — அது Gemini குரல் மாற்றத்தைத் தவிர்க்கும்.',
    'no-speech': 'ஒலி கேட்கப்படவில்லை — மைக் அழுத்தி தெளிவாகப் பேசுங்கள்.',
    'not-allowed': 'மைக் அனுமதி தேவை. முகவரிப் பட்டையில் 🔒 ஐச் சொடுக்கி மைக்கை அனுமதிக்கவும்.',
    aborted: 'குரல் நிறுத்தப்பட்டது.',
    'audio-capture': 'மைக் பயன்படுத்த முடியவில்லை — வேறு பயன்பாடு மைக்கைப் பிடித்திருக்கலாம்.',
    'service-not-allowed': 'இந்த தளத்திற்கு உலாவி குரல் சேவை தடை. உரையாக தட்டச்சு செய்யுங்கள்.',
  };
  return map[c] || `உலாவி குரல் பிழை: ${c || 'unknown'}`;
}

async function browserSpeechOnce() {
  const runOnce = () =>
    new Promise((resolve, reject) => {
      if (!SpeechRecognitionCtor) {
        reject(Object.assign(new Error('இந்த உலாவியில் Web Speech API இல்லை.'), { speechCode: 'unsupported' }));
        return;
      }
      let settled = false;
      const r = new SpeechRecognitionCtor();
      r.lang = 'ta-IN';
      r.continuous = false;
      r.interimResults = false;
      r.maxAlternatives = 1;
      r.onresult = (e) => {
        if (settled) return;
        settled = true;
        const t = e.results[0] && e.results[0][0] ? e.results[0][0].transcript : '';
        resolve(t);
      };
      r.onerror = (e) => {
        if (settled) return;
        settled = true;
        const code = e.error || 'speech_error';
        const err = new Error(speechErrorToTamil(code));
        err.speechCode = code;
        reject(err);
      };
      r.onend = () => {
        if (settled) return;
        settled = true;
        const err = new Error(speechErrorToTamil('no-speech'));
        err.speechCode = 'no-speech';
        reject(err);
      };
      try {
        r.start();
      } catch (ex) {
        reject(Object.assign(new Error(speechErrorToTamil('network')), { speechCode: 'network' }));
        return;
      }
      setTimeout(() => {
        try {
          r.stop();
        } catch (_) {}
      }, 25000);
    });

  try {
    return await runOnce();
  } catch (e) {
    if (e.speechCode === 'network') {
      await new Promise((res) => setTimeout(res, 600));
      return await runOnce();
    }
    throw e;
  }
}

micBtn.addEventListener('click', async () => {
  if (isRecording) {
    mediaRecorder.stop();
    return;
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        sampleRate: 16000,
        echoCancellation: true,
        noiseSuppression: true,
      }
    });

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : MediaRecorder.isTypeSupported('audio/mp4')
        ? 'audio/mp4'
        : 'audio/webm';

    mediaRecorder = new MediaRecorder(stream, { mimeType });
    audioChunks = [];
    recordingSecs = 0;

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      setStatus('red', '🎤 பேசுங்கள்... (நிறுத்த மீண்டும் அழுத்தவும்)');
      recordingDiv = addMsg('system', '🎤 பதிவு செய்கிறது... <strong>0வி</strong>');
      recordingTimer = setInterval(updateRecordingTime, 1000);
    };

    mediaRecorder.onstop = async () => {
      isRecording = false;
      micBtn.classList.remove('recording');
      clearInterval(recordingTimer);
      if (recordingDiv) recordingDiv.remove();
      recordingDiv = null;

      stream.getTracks().forEach(t => t.stop());

      const blob = new Blob(audioChunks, { type: mimeType });
      audioChunks = [];

      if (blob.size < 1000) {
        setStatus('green', 'தயார்');
        addMsg('system', 'ஒலி பதிவாகவில்லை — கொஞ்சம் நீளமாகப் பேசுங்கள்.');
        return;
      }

      try {
        const transcript = await transcribeAudio(blob);
        if (transcript.trim()) {
          sendQuery(transcript.trim());
        } else {
          addMsg('system', 'குரல் புரியவில்லை — மீண்டும் முயற்சிக்கவும்.');
          setStatus('green', 'தயார்');
        }
      } catch (err) {
        const msg = err.message || '';
        const isQuota = err.isQuota || msg.includes('429') || msg.includes('quota');
        if (isQuota) {
          const wait = err.retryAfter != null ? ` (~${Math.ceil(err.retryAfter)} வி)` : '';
          addMsg('error',
            `Gemini குரல்→உரை: அளவு எல்லை${wait}. ` +
            '(குரல் பதிவு இன்னும் Gemini-ஐயே பயன்படுத்துகிறது; Ollama கற்பித்தலுக்கு மட்டும்.) ' +
            'கேள்வியை உரையாக தட்டச்சு செய்யுங்கள் — அப்போது STT தவிர்க்கப்படும். ' +
            'அல்லது கீழ் பொத்தானில் உலாவி குரலை முயற்சிக்கவும்.'
          );
          if (SpeechRecognitionCtor) {
            chatArea.querySelectorAll('.browser-stt-fallback-wrap').forEach((el) => el.remove());
            const row = document.createElement('div');
            row.className = 'msg system browser-stt-fallback-wrap';
            row.style.marginTop = '8px';
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.textContent = 'உலாவி குரல் (Gemini இல்லாமல்)';
            btn.style.cssText = 'margin-top:6px;padding:8px 12px;border-radius:8px;border:1px solid var(--accent);background:var(--accent-dim);color:var(--accent);cursor:pointer;font-family:inherit;';
            btn.onclick = async () => {
              btn.disabled = true;
              setStatus('yellow', '🎤 உலாவி கேட்கிறது...');
              try {
                const t = await browserSpeechOnce();
                if (t && t.trim()) sendQuery(t.trim());
                else addMsg('system', 'குரல் புரியவில்லை.');
              } catch (e2) {
                addMsg('error', e2.message || 'உலாவி குரல் தோல்வி');
              }
              btn.disabled = false;
              setStatus('green', 'தயார்');
            };
            row.appendChild(btn);
            chatArea.appendChild(row);
            chatArea.scrollTop = chatArea.scrollHeight;
          }
          setStatus('yellow', 'API quota — உரை அல்லது உலாவி குரல்');
        } else {
          addMsg('error', `குரல் மாற்ற பிழை: ${msg.substring(0, 150)}`);
          setStatus('red', 'குரல் மாற்றம் தோல்வி');
        }
      }
    };

    mediaRecorder.start(250);

    setTimeout(() => {
      if (isRecording && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
      }
    }, 30000);

  } catch (err) {
    if (err.name === 'NotAllowedError') {
      addMsg('error',
        'நுண்ணொலிப்பான் அனுமதி மறுக்கப்பட்டது.<br>' +
        '<span style="font-size:0.75rem;color:var(--text-dim)">' +
        'உலாவி → அமைப்புகள் → தனியுரிமை → நுண்ணொலிப்பான் அனுமதிக்கவும்.</span>'
      );
    } else {
      addMsg('error', `நுண்ணொலிப்பான் பிழை: ${err.message}`);
    }
    setStatus('green', 'தயார்');
  }
});

/* ── TTS playback ── */

speakBtn.addEventListener('click', () => {
  if (!lastTutorText) return;

  if (isSpeaking) {
    speechSynthesis.cancel();
    isSpeaking = false;
    speakBtn.classList.remove('speaking');
    return;
  }

  const clean = lastTutorText
    .replace(/\*\*/g, '')
    .replace(/<[^>]+>/g, '')
    .replace(/\n+/g, '. ');

  const chunks = clean.match(/.{1,200}(?:[.!?]|$)/g) || [clean];

  let idx = 0;
  isSpeaking = true;
  speakBtn.classList.add('speaking');
  setStatus('green', '🔊 பேசுகிறது...');

  function speakNext() {
    if (idx >= chunks.length || !isSpeaking) {
      isSpeaking = false;
      speakBtn.classList.remove('speaking');
      setStatus('green', 'தயார்');
      return;
    }
    const utter = new SpeechSynthesisUtterance(chunks[idx]);
    utter.lang = 'ta-IN';
    utter.rate = parseFloat($('#speechRate').value);
    utter.onend = () => { idx++; speakNext(); };
    utter.onerror = () => { idx++; speakNext(); };
    speechSynthesis.speak(utter);
  }
  speakNext();
});

refreshBackendBadge();
const apiUrlInput = $('#apiUrl');
if (apiUrlInput) {
  apiUrlInput.addEventListener('change', () => refreshBackendBadge());
  apiUrlInput.addEventListener('blur', () => refreshBackendBadge());
}

window.addEventListener('beforeunload', () => {
  if (isSpeaking) speechSynthesis.cancel();
  if (isRecording && mediaRecorder) mediaRecorder.stop();
});
